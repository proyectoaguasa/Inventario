<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Proyecto Agua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const CONTRASEÑA_CORRECTA = "Agua2026"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx4rIM4uX58StNiL820_Frm5M3XtD8CxcgLvsX2GyrmI7EY7w3sgG0qFRk4gHofDbpmAQ/exec";
        
        let bd_productos = [];
        let bd_rubros = [];
        let bd_proveedores = [];
        let productoSeleccionado = null;

        function verificarAcceso() {
            let intento = prompt("Ingresá la contraseña de Proyecto Agua para acceder:");
            if (intento === CONTRASEÑA_CORRECTA) {
                sessionStorage.setItem("acceso_inventario", "concedido");
                document.getElementById("contenedorWeb").classList.remove("hidden");
                inicializarSistema(); 
            } else {
                alert("Contraseña incorrecta. Acceso denegado.");
                window.location.href = "https://www.google.com"; 
            }
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem("acceso_inventario") === "concedido") {
                document.getElementById("contenedorWeb").classList.remove("hidden");
                inicializarSistema();
            } else {
                verificarAcceso();
            }
        });
    </script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #areaImpresion, #areaImpresion * { visibility: visible; }
            #areaImpresion { position: absolute; left: 0; top: 0; width: 100%; font-size: 10pt; }
            .no-print { display: none !important; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid #cbd5e1; padding: 6px; text-align: left; }
            th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div id="contenedorWeb" class="max-w-md mx-auto p-4 pb-24 no-print hidden">
        
        <header class="mb-6 bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
            <h1 class="text-xl font-bold text-blue-400 text-center tracking-wide uppercase">Proyecto Agua</h1>
            <p class="text-xs text-gray-400 text-center mb-4">Gestión de Inventario Centralizado</p>
            
            <div class="flex items-center justify-between bg-gray-900 p-3 rounded-lg border border-gray-700">
                <span class="text-sm font-medium text-gray-300">💵 Cotización Dólar hoy:</span>
                <div class="flex items-center gap-1">
                    <span class="text-emerald-400 font-bold">$</span>
                    <input type="number" id="cotizacionDolar" value="1350" oninput="renderizarBusqueda()" class="w-20 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-center font-bold text-emerald-400 focus:outline-none focus:border-emerald-500">
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="cambiarModo('buscar')" id="btnModoBuscar" class="bg-blue-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all">🔍 Buscar / Operar</button>
            <button onclick="cambiarModo('crear')" id="btnModoCrear" class="bg-gray-800 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all">➕ Alta Nuevo Producto</button>
        </div>

        <!-- BUSCADOR INTELIGENTE MULTI-PALABRA -->
        <section id="seccionBuscador" class="mb-6">
            <div class="relative">
                <input type="text" id="buscador" oninput="renderizarBusqueda()" placeholder="Ej: 'alguicida 1l nataclor' o 'repuesto dolphin'" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 pl-10 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 shadow-inner">
                <span class="absolute left-3 top-3.5 text-gray-500">🔍</span>
            </div>
            <!-- Lista ampliada a un alto máximo mayor para scroll cómodo -->
            <div id="listaResultados" class="mt-2 space-y-2 max-h-96 overflow-y-auto"></div>
        </section>

        <!-- FORMULARIO DE ALTA -->
        <section id="seccionAltaNueva" class="hidden bg-gray-800 p-4 rounded-xl border-l-4 border-emerald-500 shadow-md mb-6 space-y-3">
            <h3 class="font-bold text-white text-sm uppercase tracking-wider mb-2">✨ Ingresar Nuevo Artículo al Sistema</h3>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Código Único (ID):</label>
                <input type="text" id="nuevoID" placeholder="Ej: DOL-01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Descripción / Nombre Completo:</label>
                <input type="text" id="nuevoDesc" placeholder="Ej: Alguicida Nataclor 1 Litro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Rubro:</label>
                    <div class="flex gap-1">
                        <select id="nuevoRubro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white focus:outline-none focus:border-emerald-500"></select>
                        <button onclick="crearAuxiliar('Rubros')" class="bg-gray-700 px-2 rounded-lg text-sm hover:bg-gray-600">➕</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Proveedor:</label>
                    <div class="flex gap-1">
                        <select id="nuevoProv" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white focus:outline-none focus:border-emerald-500"></select>
                        <button onclick="crearAuxiliar('Proveedores')" class="bg-gray-700 px-2 rounded-lg text-sm hover:bg-gray-600">➕</button>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Moneda:</label>
                    <select id="nuevoMoneda" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-emerald-500">
                        <option value="USD">USD ($)</option>
                        <option value="ARS">ARS ($)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Precio Base:</label>
                    <input type="number" id="nuevoPrecio" value="0" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white font-bold focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Costo Variable:</label>
                    <input type="number" id="nuevoCosto" value="0" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-1">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Stock Lemos Inicial:</label>
                    <input type="number" id="nuevoStockLemos" value="0" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Stock Ozamis Inicial:</label>
                    <input type="number" id="nuevoStockOzamis" value="0" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            <button onclick="registrarProductoNuevo()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white font-bold py-2.5 rounded-lg text-sm mt-3 transition-all uppercase">🚀 Dar de Alta e Inyectar a Sheets</button>
        </section>

        <!-- PANEL DE CONTROL DEL PRODUCTO SELECCIONADO -->
        <main id="panelProducto" class="hidden space-y-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                <div class="flex justify-between items-start mb-2">
                    <span id="cardCodigo" class="bg-blue-900 text-blue-300 text-xs font-bold px-2 py-1 rounded"></span>
                    <span id="cardRubro" class="text-xs text-gray-400 font-medium"></span>
                </div>
                <h2 id="cardDescripcion" class="text-lg font-bold text-white mb-3"></h2>
                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-gray-900 p-3 rounded-lg border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase mb-1">📍 Stock Lemos</p>
                        <p id="cardStockLemos" class="text-xl font-bold text-blue-400">0</p>
                    </div>
                    <div class="bg-gray-900 p-3 rounded-lg border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase mb-1">📍 Stock Ozamis</p>
                        <p id="cardStockOzamis" class="text-xl font-bold text-blue-400">0</p>
                    </div>
                    <div class="bg-gray-900 p-3 rounded-lg border border-gray-700 col-span-2">
                        <p class="text-xs text-gray-400 uppercase mb-1">💸 Precio al Cobro</p>
                        <p id="cardPrecioPesos" class="text-2xl font-black text-emerald-400">$ 0,00</p>
                        <p id="cardPrecioOriginal" class="text-xs text-gray-500 mt-0.5"></p>
                    </div>
                </div>
            </div>

            <!-- INTERFAZ DE MOVIMIENTOS -->
            <section class="bg-gray-800 p-4 rounded-xl border-l-4 border-green-500 shadow-md">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🟩</span>
                    <h3 class="font-bold text-white text-sm uppercase tracking-wider">Mover Stock (Operación Diaria)</h3>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">1. Seleccionar Destino:</label>
                        <select id="movSucursal" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm focus:outline-none focus:border-green-500">
                            <option value="Stock Lemos">Sucursal Calle Lemos</option>
                            <option value="Stock Ozamis">Sucursal Ozamis</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">2. Cantidad de Unidades:</label>
                        <input type="number" id="movCantidad" value="1" min="1" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm font-bold text-center focus:outline-none focus:border-green-500">
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-1">
                        <button onclick="ejecutarMovimiento('entrada')" class="bg-green-600 hover:bg-green-700 active:scale-95 text-white font-bold py-2.5 px-1 rounded-lg text-xs transition-all uppercase">➕ Entrada</button>
                        <button onclick="ejecutarMovimiento('salida')" class="bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-2.5 px-1 rounded-lg text-xs transition-all uppercase">➖ Salida</button>
                        <button onclick="ejecutarMovimiento('ajuste')" class="bg-amber-600 hover:bg-amber-700 active:scale-95 text-white font-bold py-2.5 px-1 rounded-lg text-xs transition-all uppercase">🟰 Ajuste</button>
                    </div>
                </div>
            </section>

            <!-- EDICIÓN DE FICHA -->
            <section class="bg-gray-800 p-4 rounded-xl border-l-4 border-blue-500 shadow-md">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🟦</span>
                    <h3 class="font-bold text-white text-sm uppercase tracking-wider">Editar Datos (Ficha de Producto)</h3>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Descripción del Artículo:</label>
                        <input type="text" id="editDesc" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Rubro:</label>
                            <select id="editRubro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs focus:outline-none focus:border-blue-500"></select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Proveedor:</label>
                            <select id="editProv" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs focus:outline-none focus:border-blue-500"></select>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Moneda:</label>
                            <select id="editMoneda" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs focus:outline-none focus:border-blue-500">
                                <option value="USD">USD ($)</option>
                                <option value="ARS">ARS ($)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Precio:</label>
                            <input type="number" id="editPrecio" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center font-bold focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Costo Variable:</label>
                            <input type="number" id="editCosto" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <button onclick="guardarFichaProducto()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-2 rounded-lg text-sm mt-2 transition-all uppercase">💾 Guardar Ficha Permanente</button>
                </div>
            </section>
        </main>

        <!-- CONFIGURACIÓN DE REPORTES -->
        <section class="mt-8 bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
            <h3 class="font-bold text-white text-sm uppercase tracking-wider mb-3 text-center border-b border-gray-700 pb-2">📋 Módulo de Impresiones & PDF</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Filtrar Criterio / Rubro:</label>
                    <select id="repRubro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="TODOS">-- Todos los Rubros --</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generarReporte('precios')" class="bg-emerald-700 hover:bg-emerald-600 font-bold py-2.5 px-2 rounded-lg text-xs text-center transition-all">💵 Lista de Precios</button>
                    <button onclick="generarReporte('stock')" class="bg-indigo-700 hover:bg-indigo-600 font-bold py-2.5 px-2 rounded-lg text-xs text-center transition-all">📦 Reporte de Stock</button>
                </div>
            </div>
        </section>
    </div>

    <div id="areaImpresion" class="hidden"></div>

    <script>
        async function inicializarSistema() {
            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getInicial' })
                });
                const api = await res.json();
                bd_productos = api.productos || [];
                bd_rubros = api.rubros || [];
                bd_proveedores = api.proveedores || [];
                
                actualizarMenusDesplegables();
            } catch (e) {
                alert("Error de red con Google Sheets: " + e.message);
            }
        }

        function cambiarModo(modo) {
            const btnB = document.getElementById('btnModoBuscar');
            const btnC = document.getElementById('btnModoCrear');
            const secB = document.getElementById('seccionBuscador');
            const secC = document.getElementById('seccionAltaNueva');
            
            if (modo === 'buscar') {
                btnB.className = "bg-blue-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                btnC.className = "bg-gray-800 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                secB.classList.remove('hidden');
                secC.classList.add('hidden');
            } else {
                btnC.className = "bg-emerald-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                btnB.className = "bg-gray-800 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                secC.classList.remove('hidden');
                secB.classList.add('hidden');
                document.getElementById('panelProducto').classList.add('hidden');
            }
        }

        function actualizarMenusDesplegables() {
            const rSelect = document.getElementById('editRubro');
            const pSelect = document.getElementById('editProv');
            const nrSelect = document.getElementById('nuevoRubro');
            const npSelect = document.getElementById('nuevoProv');
            const repSelect = document.getElementById('repRubro');
            
            const rHtml = bd_rubros.map(r => `<option value="${r.Nombre}">${r.Nombre}</option>`).join('');
            const pHtml = bd_proveedores.map(p => `<option value="${p.Nombre}">${p.Nombre}</option>`).join('');
            
            rSelect.innerHTML = rHtml; nrSelect.innerHTML = rHtml;
            pSelect.innerHTML = pHtml; npSelect.innerHTML = pHtml;
            repSelect.innerHTML = '<option value="TODOS">-- Todos los Rubros --</option>' + bd_rubros.map(r => `<option value="${r.Nombre}">${r.Nombre}</option>`).join('');
        }

        // ==========================================
        // MOTOR DE BÚSQUEDA PREDICTIVO INTELIGENTE (MULTI-PALABRA)
        // ==========================================
        function renderizarBusqueda() {
            const inputText = document.getElementById('buscador').value.toLowerCase().trim();
            const contenedor = document.getElementById('listaResultados');
            if (!inputText) { contenedor.innerHTML = ''; return; }
            
            // Fraccionar la búsqueda por términos/palabras individuales
            const terminosBusqueda = inputText.split(/\s+/);
            
            // Filtrar productos que contengan TODOS los términos escritos
            const filtrados = bd_productos.filter(p => {
                const contenidoProducto = `
                    ${p.ID ? p.ID.toString().toLowerCase() : ''} 
                    ${p.Descripción ? p.Descripción.toLowerCase() : ''} 
                    ${p.Rubro ? p.Rubro.toLowerCase() : ''} 
                    ${p.Proveedor ? p.Proveedor.toLowerCase() : ''}
                `;
                
                // Evaluar si cada palabra individual está presente en los metadatos del ítem
                return terminosBusqueda.every(termino => contenidoProducto.includes(termino));
            });
            
            if(filtrados.length === 0) {
                contenedor.innerHTML = `<div class="text-xs text-gray-500 text-center py-2">No se encontraron productos coincidentes.</div>`;
                return;
            }

            // Ampliado el límite visual de visualización de 5 a 15 artículos simultáneos
            contenedor.innerHTML = filtrados.slice(0, 15).map(p => `
                <div onclick="seleccionarProducto('${p.ID}')" class="bg-gray-800 border border-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-700 hover:border-blue-500 transition-all shadow-sm">
                    <div class="flex justify-between font-bold text-xs text-blue-400"><span>${p.ID}</span><span class="text-gray-500">${p.Rubro || 'Sin Rubro'}</span></div>
                    <div class="text-sm text-white mt-1 font-medium">${p.Descripción || '(Error de Registro - Celda Vacía en Sheets)'}</div>
                </div>
            `).join('');
        }

        function seleccionarProducto(id) {
            productoSeleccionado = bd_productos.find(p => p.ID.toString() === id.toString());
            document.getElementById('listaResultados').innerHTML = '';
            document.getElementById('buscador').value = '';
            if (!productoSeleccionado) return;
            
            document.getElementById('cardCodigo').innerText = productoSeleccionado.ID;
            document.getElementById('cardRubro').innerText = productoSeleccionado.Rubro || 'Sin Rubro';
            document.getElementById('cardDescripcion').innerText = productoSeleccionado.Descripción || 'Sin Descripción';
            document.getElementById('cardStockLemos').innerText = `${productoSeleccionado['Stock Lemos'] || 0} u.`;
            document.getElementById('cardStockOzamis').innerText = `${productoSeleccionado['Stock Ozamis'] || 0} u.`;
            
            const cot = parseFloat(document.getElementById('cotizacionDolar').value) || 1;
            let finalArs = productoSeleccionado['Moneda (ARS/USD)'] === 'USD' ? (productoSeleccionado.Precio || 0) * cot : (productoSeleccionado.Precio || 0);
            document.getElementById('cardPrecioOriginal').innerText = productoSeleccionado['Moneda (ARS/USD)'] === 'USD' ? `Base: USD $${(productoSeleccionado.Precio || 0).toFixed(2)}` : `Base: ARS Estable`;
            document.getElementById('cardPrecioPesos').innerText = `$ ${finalArs.toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
            
            document.getElementById('editDesc').value = productoSeleccionado.Descripción || '';
            document.getElementById('editRubro').value = productoSeleccionado.Rubro || '';
            document.getElementById('editProv').value = productoSeleccionado.Proveedor || '';
            document.getElementById('editMoneda').value = productoSeleccionado['Moneda (ARS/USD)'] || 'ARS';
            document.getElementById('editPrecio').value = productoSeleccionado.Precio || 0;
            document.getElementById('editCosto').value = productoSeleccionado.Costo || 0;
            
            document.getElementById('panelProducto').classList.remove('hidden');
        }

        async function registrarProductoNuevo() {
            const id = document.getElementById('nuevoID').value.trim();
            const desc = document.getElementById('nuevoDesc').value.trim();
            if(!id || !desc) { alert("Por favor completá obligatoriamente el Código y la Descripción."); return; }

            const prod = {
                ID: id,
                Descripción: desc,
                Rubro: document.getElementById('nuevoRubro').value,
                Proveedor: document.getElementById('nuevoProv').value,
                "Moneda (ARS/USD)": document.getElementById('nuevoMoneda').value,
                Precio: parseFloat(document.getElementById('nuevoPrecio').value) || 0,
                Costo: parseFloat(document.getElementById('nuevoCosto').value) || 0,
                "Stock Lemos": parseInt(document.getElementById('nuevoStockLemos').value) || 0,
                "Stock Ozamis": parseInt(document.getElementById('nuevoStockOzamis').value) || 0
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'guardarProducto', data: prod })
                });
                const rta = await res.json();
                if (rta.success) {
                    alert(`¡Artículo ${id} dado de alta con éxito!`);
                    bd_productos.push(prod);
                    document.getElementById('nuevoID').value = '';
                    document.getElementById('nuevoDesc').value = '';
                    document.getElementById('nuevoPrecio').value = '0';
                    document.getElementById('nuevoCosto').value = '0';
                    document.getElementById('nuevoStockLemos').value = '0';
                    document.getElementById('nuevoStockOzamis').value = '0';
                    cambiarModo('buscar');
                }
            } catch(e) {
                alert("Error al inyectar el nuevo producto.");
            }
        }

        async function ejecutarMovimiento(tipo) {
            if (!productoSeleccionado) return;
            const suc = document.getElementById('movSucursal').value;
            const cant = parseInt(document.getElementById('movCantidad').value) || 0;
            if (cant <= 0) { alert("Ingresá un número mayor a cero."); return; }
            
            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'moverStock', data: { ID: productoSeleccionado.ID, sucursal: suc, tipo: tipo, cantidad: cant } })
                });
                const rta = await res.json();
                if (rta.success) {
                    productoSeleccionado[suc] = rta.nuevoStock;
                    seleccionarProducto(productoSeleccionado.ID);
                }
            } catch (e) { alert("Fallo de red."); }
        }

        async function guardarFichaProducto() {
            if (!productoSeleccionado) return;
            const prodModificado = {
                ID: productoSeleccionado.ID,
                Descripción: document.getElementById('editDesc').value,
                Rubro: document.getElementById('editRubro').value,
                Proveedor: document.getElementById('editProv').value,
                "Moneda (ARS/USD)": document.getElementById('editMoneda').value,
                Precio: parseFloat(document.getElementById('editPrecio').value) || 0,
                Costo: parseFloat(document.getElementById('editCosto').value) || 0,
                "Stock Lemos": productoSeleccionado["Stock Lemos"],
                "Stock Ozamis": productoSeleccionado["Stock Ozamis"]
            };
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'guardarProducto', data: prodModificado }) });
                const rta = await res.json();
                if (rta.success) {
                    alert("Ficha guardada.");
                    Object.assign(productoSeleccionado, prodModificado);
                    seleccionarProducto(productoSeleccionado.ID);
                }
            } catch (e) { alert("Error."); }
        }

        async function crearAuxiliar(tablaDestino) {
            const nombre = prompt(`Ingresá el nombre para la lista de ${tablaDestino}:`);
            if (!nombre) return;
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'agregarAuxiliar', tabla: tablaDestino, nombre: nombre }) });
                const rta = await res.json();
                if (rta.success) {
                    if (tablaDestino === 'Rubros') bd_rubros.push({ Nombre: nombre });
                    if (tablaDestino === 'Proveedores') bd_proveedores.push({ Nombre: nombre });
                    actualizarMenusDesplegables();
                }
            } catch (e) { alert("Error."); }
        }

        // GENERACIÓN DE REPORTES RESISTENTE A CAMPOS VACÍOS
        function generarReporte(tipo) {
            const rubroFiltro = document.getElementById('repRubro').value;
            const cot = parseFloat(document.getElementById('cotizacionDolar').value) || 1;
            const fecha = new Date().toLocaleDateString('es-AR');
            
            // Seguridad: Filtrar y omitir registros rotos (sin ID o sin Descripción) para que no rompan el PDF
            let validos = bd_productos.filter(p => p.ID && p.Descripción);
            let filtrados = rubroFiltro !== 'TODOS' ? validos.filter(p => p.Rubro === rubroFiltro) : validos;
            
            if (filtrados.length === 0) {
                alert("No hay ningún producto cargado correctamente bajo este criterio de rubro para poder listar.");
                return;
            }

            let html = '';
            const area = document.getElementById('areaImpresion');
            
            if (tipo === 'precios') {
                html = `<div style="font-family: Arial, sans-serif; padding: 10px; color:#111;"><h2 style="text-align:center; text-transform:uppercase; font-size:16pt; color:#1e3a8a;">Proyecto Agua</h2><h3 style="text-align:center; margin-top:0; font-size:12pt; font-weight:normal;">Lista de Precios Oficial</h3><p style="font-size:9pt; color:#64748b;">Fecha: ${fecha} | Referencia Dólar: $${cot.toFixed(2)}</p><table><thead><tr><th>Código</th><th>Descripción</th><th>Rubro</th><th style="text-align:right;">Precio (ARS)</th></tr></thead><tbody>${filtrados.map(p => { let pFinal = p["Moneda (ARS/USD)"] === 'USD' ? (p.Precio || 0) * cot : (p.Precio || 0); return `<tr><td><strong>${p.ID}</strong></td><td>${p.Descripción}</td><td>${p.Rubro || 'General'}</td><td style="text-align:right; font-weight:bold;">$ ${pFinal.toLocaleString('es-AR', {minimumFractionDigits:2})}</td></tr>`; }).join('')}</tbody></table></div>`;
            } else {
                html = `<div style="font-family: Arial, sans-serif; padding: 10px; color:#111;"><h2 style="text-align:center; text-transform:uppercase; font-size:16pt; color:#1e3a8a;">Proyecto Agua</h2><h3 style="text-align:center; margin-top:0; font-size:12pt; font-weight:normal;">Reporte General de Stock</h3><p style="font-size:9pt; color:#64748b;">Fecha: ${fecha}</p><table><thead><tr><th>Código</th><th>Descripción</th><th>Rubro</th><th style="text-align:center;">Lemos</th><th style="text-align:center;">Ozamis</th></tr></thead><tbody>${filtrados.map(p => `<tr><td><strong>${p.ID}</strong></td><td>${p.Descripción}</td><td>${p.Rubro || 'General'}</td><td style="text-align:center; font-weight:bold;">${p["Stock Lemos"] || 0} u.</td><td style="text-align:center; font-weight:bold;">${p["Stock Ozamis"] || 0} u.</td></tr>`).join('')}</tbody></table></div>`;
            }
            area.innerHTML = html; window.print();
        }
    </script>
</body>
