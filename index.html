<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Proyecto Agua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías para generación de PDF directo en el dispositivo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        const CONTRASEÑA_CORRECTA = "Agua2026"; 
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx4rIM4uX58StNiL820_Frm5M3XtD8CxcgLvsX2GyrmI7EY7w3sgG0qFRk4gHofDbpmAQ/exec";
        
        let bd_productos = [];
        let bd_rubros = [];
        let bd_proveedores = [];
        let productoSeleccionado = null;

        function verificarAcceso() {
            let intento = prompt("Ingresá la contraseña de Proyecto Agua para acceder:");
            if (intento === CONTRASEÑA_CORRECTA) {
                sessionStorage.setItem("acceso_inventario", "concedido");
                document.getElementById("contenedorWeb").classList.remove("hidden");
                inicializarSistema(); 
            } else {
                alert("Contraseña incorrecta. Acceso denegado.");
                window.location.href = "https://www.google.com"; 
            }
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem("acceso_inventario") === "concedido") {
                document.getElementById("contenedorWeb").classList.remove("hidden");
                inicializarSistema();
            } else {
                verificarAcceso();
            }
        });
    </script>
</head>
<body class="bg-[url('bg.jpg')] bg-cover bg-center bg-no-repeat bg-fixed text-gray-100 font-sans min-h-screen">

    <!-- CAPA DE OSCURECIMIENTO Y DESENFOQUE PARA LEGIBILIDAD -->
    <div class="min-h-screen bg-black/40 backdrop-blur-sm w-full py-4 pb-24">
        
        <!-- CONTENEDOR PRINCIPAL INTERFAZ -->
        <div id="contenedorWeb" class="max-w-md mx-auto px-4 hidden">
            
            <header class="mb-6 bg-gray-800/95 p-4 rounded-xl border border-gray-700 shadow-xl backdrop-blur-md">
                <h1 class="text-xl font-bold text-blue-400 text-center tracking-wide uppercase">Proyecto Agua</h1>
                <p class="text-xs text-gray-400 text-center mb-4">Gestión de Inventario Centralizado</p>
                
                <div class="flex items-center justify-between bg-gray-900/90 p-3 rounded-lg border border-gray-700">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium text-gray-300">💵 Cotización Dólar:</span>
                        <span id="estadoDolar" class="text-[10px] text-emerald-400 italic">Guardado y activo</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-emerald-400 font-bold">$</span>
                        <input type="number" id="cotizacionDolar" value="1350" oninput="guardarYActualizarDolar();" class="w-20 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-center font-bold text-emerald-400 focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="cambiarModo('buscar')" id="btnModoBuscar" class="bg-blue-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all">🔍 Buscar / Operar</button>
                <button onclick="cambiarModo('crear')" id="btnModoCrear" class="bg-gray-800/90 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all">➕ Alta Nuevo Producto</button>
            </div>

            <!-- BUSCADOR INTELIGENTE -->
            <section id="seccionBuscador" class="mb-6">
                <div class="relative">
                    <input type="text" id="buscador" oninput="renderizarBusqueda()" placeholder="Ej: 'alg 1l nataclor' o 'rep dolphin'" class="w-full bg-gray-800/95 border border-gray-700 rounded-xl px-4 py-3 pl-10 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 shadow-lg">
                    <span class="absolute left-3 top-3.5 text-gray-500">🔍</span>
                </div>
                <div id="listaResultados" class="mt-2 space-y-2 max-h-96 overflow-y-auto"></div>
            </section>

            <!-- FORMULARIO DE ALTA -->
            <section id="seccionAltaNueva" class="hidden bg-gray-800/95 p-4 rounded-xl border-l-4 border-emerald-500 shadow-lg mb-6 space-y-3">
                <h3 class="font-bold text-white text-sm uppercase tracking-wider mb-2">✨ Ingresar Nuevo Artículo al Sistema</h3>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Código Único (ID):</label>
                    <input type="text" id="nuevoID" placeholder="Ej: DOL-01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Descripción / Nombre Completo:</label>
                    <input type="text" id="nuevoDesc" placeholder="Ej: Alguicida Nataclor 1 Litro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Rubro:</label>
                        <div class="flex gap-1">
                            <select id="nuevoRubro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white focus:outline-none focus:border-emerald-500"></select>
                            <button onclick="crearAuxiliar('Rubros')" class="bg-gray-700 px-2 rounded-lg text-sm hover:bg-gray-600">➕</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Proveedor:</label>
                        <div class="flex gap-1">
                            <select id="nuevoProv" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white focus:outline-none focus:border-emerald-500"></select>
                            <button onclick="crearAuxiliar('Proveedores')" class="bg-gray-700 px-2 rounded-lg text-sm hover:bg-gray-600">➕</button>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Moneda:</label>
                        <select id="nuevoMoneda" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-emerald-500">
                            <option value="USD">USD ($)</option>
                            <option value="ARS">ARS ($)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Precio Base:</label>
                        <input type="number" id="nuevoPrecio" value="0" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white font-bold focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Costo Variable:</label>
                        <input type="number" id="nuevoCosto" value="0" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Stock Lemos Inicial:</label>
                        <input type="number" id="nuevoStockLemos" value="0" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Stock Ozamis Inicial:</label>
                        <input type="number" id="nuevoStockOzamis" value="0" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                <button onclick="registrarProductoNuevo()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white font-bold py-2.5 rounded-lg text-sm mt-3 transition-all uppercase shadow-md">🚀 Dar de Alta e Inyectar a Sheets</button>
            </section>

        <!-- PANEL DE OPERACIÓN -->
        <main id="panelProducto" class="hidden space-y-6">
            <div class="bg-gray-800/95 p-4 rounded-xl border border-gray-700 shadow-lg">
                <div class="flex justify-between items-start mb-2">
                    <span id="cardCodigo" class="bg-blue-900 text-blue-300 text-xs font-bold px-2 py-1 rounded"></span>
                    <span id="cardRubro" class="text-xs text-gray-400 font-medium"></span>
                </div>
                <h2 id="cardDescripcion" class="text-lg font-bold text-white mb-3"></h2>
                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-gray-900/90 p-3 rounded-lg border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase mb-1">📍 Stock Lemos</p>
                        <p id="cardStockLemos" class="text-xl font-bold text-blue-400">0</p>
                    </div>
                    <div class="bg-gray-900/90 p-3 rounded-lg border border-gray-700">
                        <p class="text-xs text-gray-400 uppercase mb-1">📍 Stock Ozamis</p>
                        <p id="cardStockOzamis" class="text-xl font-bold text-blue-400">0</p>
                    </div>
                    <div class="bg-gray-900/90 p-3 rounded-lg border border-gray-700 col-span-2">
                        <p class="text-xs text-gray-400 uppercase mb-1">💸 Precio al Cobro</p>
                        <p id="cardPrecioPesos" class="text-2xl font-black text-emerald-400">$ 0,00</p>
                        <p id="cardPrecioOriginal" class="text-xs text-gray-500 mt-0.5"></p>
                    </div>
                </div>
            </div>

            <!-- MOVIMIENTOS DIARIOS -->
            <section class="bg-gray-800/95 p-4 rounded-xl border-l-4 border-green-500 shadow-lg">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🟩</span>
                    <h3 class="font-bold text-white text-sm uppercase tracking-wider">Mover Stock</h3>
                </div>
                <div class="space-y-3">
                    <div>
                        <select id="movSucursal" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white">
                            <option value="Stock Lemos">Sucursal Calle Lemos</option>
                            <option value="Stock Ozamis">Sucursal Ozamis</option>
                        </select>
                    </div>
                    <div>
                        <input type="number" id="movCantidad" value="1" min="1" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm font-bold text-center text-white">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="ejecutarMovimiento('entrada')" class="bg-green-600 text-white font-bold py-2 rounded-lg text-xs uppercase">➕ Entrada</button>
                        <button onclick="ejecutarMovimiento('salida')" class="bg-red-600 text-white font-bold py-2 rounded-lg text-xs uppercase">➖ Salida</button>
                        <button onclick="ejecutarMovimiento('ajuste')" class="bg-amber-600 text-white font-bold py-2 rounded-lg text-xs uppercase">🟰 Ajuste</button>
                    </div>
                </div>
            </section>

            <!-- EDICIÓN DE FICHA -->
            <section class="bg-gray-800/95 p-4 rounded-xl border-l-4 border-blue-500 shadow-lg">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🟦</span>
                    <h3 class="font-bold text-white text-sm uppercase tracking-wider">Editar Ficha</h3>
                </div>
                <div class="space-y-3">
                    <input type="text" id="editDesc" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="editRubro" class="bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-white"></select>
                        <select id="editProv" class="bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-white"></select>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="editMoneda" class="bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-white">
                            <option value="USD">USD</option>
                            <option value="ARS">ARS</option>
                        </select>
                        <input type="number" id="editPrecio" step="0.01" class="bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white font-bold">
                        <input type="number" id="editCosto" step="0.01" class="bg-gray-900 border border-gray-700 rounded-lg p-2 text-xs text-center text-white">
                    </div>
                    <button onclick="guardarFichaProducto()" class="w-full bg-blue-600 font-bold py-2 rounded-lg text-xs uppercase text-white shadow-md">💾 Guardar Ficha</button>
                </div>
            </section>
        </main>

        <!-- GENERACIÓN DE ARCHIVOS PDF DIRECTOS -->
        <section class="mt-8 bg-gray-800/95 p-4 rounded-xl border border-gray-700 shadow-lg backdrop-blur-md">
            <h3 class="font-bold text-white text-sm uppercase tracking-wider mb-3 text-center border-b border-gray-700 pb-2">📋 Descarga Directa de PDF</h3>
            <div class="space-y-3">
                <select id="repRubro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-white">
                    <option value="TODOS">-- Todos los Rubros --</option>
                </select>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="descargarPDFDirecto('precios')" class="bg-emerald-700 hover:bg-emerald-600 font-bold py-2.5 rounded-lg text-xs text-white uppercase tracking-wider shadow">📥 Bajar Precios</button>
                    <button onclick="descargarPDFDirecto('stock')" class="bg-indigo-700 hover:bg-indigo-600 font-bold py-2.5 rounded-lg text-xs text-white uppercase tracking-wider shadow">📥 Bajar Stock</button>
                </div>
            </div>
        </section>
    </div>
</div>

    <script>
        function cargarCotizacionGuardada() {
            const dolarGuardado = localStorage.getItem("ultima_cotizacion_agua");
            if (dolarGuardado) {
                document.getElementById('cotizacionDolar').value = dolarGuardado;
            } else {
                document.getElementById('cotizacionDolar').value = "1350";
                localStorage.setItem("ultima_cotizacion_agua", "1350");
            }
        }

        function guardarYActualizarDolar() {
            const nuevoValor = document.getElementById('cotizacionDolar').value || "1";
            localStorage.setItem("ultima_cotizacion_agua", nuevoValor);
            actualizarPreciosEnPantalla(); 
            renderizarBusqueda();
        }

        async function inicializarSistema() {
            cargarCotizacionGuardada();
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getInicial' }) });
                const api = await res.json();
                bd_productos = api.productos || [];
                bd_rubros = api.rubros || [];
                bd_proveedores = api.proveedores || [];
                actualizarMenusDesplegables();
            } catch (e) { alert("Error de carga."); }
        }

        function cambiarModo(modo) {
            const btnB = document.getElementById('btnModoBuscar');
            const btnC = document.getElementById('btnModoCrear');
            const secB = document.getElementById('seccionBuscador');
            const secC = document.getElementById('seccionAltaNueva');
            if (modo === 'buscar') {
                btnB.className = "bg-blue-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                btnC.className = "bg-gray-800/90 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                secB.classList.remove('hidden'); secC.classList.add('hidden');
            } else {
                btnC.className = "bg-emerald-600 text-white font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                btnB.className = "bg-gray-800/90 border border-gray-700 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase shadow-md transition-all";
                secC.classList.remove('hidden'); secB.classList.add('hidden');
                document.getElementById('panelProducto').classList.add('hidden');
            }
        }

        function actualizarMenusDesplegables() {
            const rSelect = document.getElementById('editRubro'); const pSelect = document.getElementById('editProv');
            const nrSelect = document.getElementById('nuevoRubro'); const npSelect = document.getElementById('nuevoProv');
            const repSelect = document.getElementById('repRubro');
            const rHtml = bd_rubros.map(r => `<option value="${r.Nombre}">${r.Nombre}</option>`).join('');
            const pHtml = bd_proveedores.map(p => `<option value="${p.Nombre}">${p.Nombre}</option>`).join('');
            rSelect.innerHTML = rHtml; nrSelect.innerHTML = rHtml; pSelect.innerHTML = pHtml; npSelect.innerHTML = pHtml;
            repSelect.innerHTML = '<option value="TODOS">-- Todos los Rubros --</option>' + rHtml;
        }

        function renderizarBusqueda() {
            const inputText = document.getElementById('buscador').value.toLowerCase().trim();
            const contenedor = document.getElementById('listaResultados');
            if (!inputText) { contenedor.innerHTML = ''; return; }
            
            const terminos = inputText.split(/\s+/);
            const filtrados = bd_productos.filter(p => {
                const desc = p.Descripción ? p.Descripción.toLowerCase() : '';
                const id = p.ID ? p.ID.toString().toLowerCase() : '';
                const rubro = p.Rubro ? p.Rubro.toLowerCase() : '';
                return terminos.every(t => desc.includes(t) || id.includes(t) || rubro.includes(t));
            });
            
            if(filtrados.length === 0) {
                contenedor.innerHTML = `<div class="text-xs text-gray-900 font-bold text-center py-2 bg-white/80 rounded-lg">Sin coincidencia.</div>`;
                return;
            }

            contenedor.innerHTML = filtrados.slice(0, 15).map(p => `
                <div onclick="seleccionarProducto('${p.ID}')" class="bg-gray-800 border border-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-700 hover:border-blue-500 transition shadow-md">
                    <div class="flex justify-between font-bold text-xs text-blue-400"><span>${p.ID}</span><span class="text-gray-500">${p.Rubro || 'Gral'}</span></div>
                    <div class="text-sm text-white mt-1 font-medium">${p.Descripción || 'Sin descripción'}</div>
                </div>
            `).join('');
        }

        function seleccionarProducto(id) {
            productoSeleccionado = bd_productos.find(p => p.ID.toString() === id.toString());
            document.getElementById('listaResultados').innerHTML = '';
            document.getElementById('buscador').value = '';
            if (!productoSeleccionado) return;
            
            document.getElementById('cardCodigo').innerText = productoSeleccionado.ID;
            document.getElementById('cardRubro').innerText = productoSeleccionado.Rubro || 'Gral';
            document.getElementById('cardDescripcion').innerText = productoSeleccionado.Descripción || 'Sin descripción';
            document.getElementById('cardStockLemos').innerText = `${productoSeleccionado['Stock Lemos'] || 0} u.`;
            document.getElementById('cardStockOzamis').innerText = `${productoSeleccionado['Stock Ozamis'] || 0} u.`;
            
            actualizarPreciosEnPantalla();
            
            document.getElementById('editDesc').value = productoSeleccionado.Descripción || '';
            document.getElementById('editRubro').value = productoSeleccionado.Rubro || '';
            document.getElementById('editProv').value = productoSeleccionado.Proveedor || '';
            document.getElementById('editMoneda').value = productoSeleccionado['Moneda (ARS/USD)'] || 'ARS';
            document.getElementById('editPrecio').value = productoSeleccionado.Precio || 0;
            document.getElementById('editCosto').value = productoSeleccionado.Costo || 0;
            
            document.getElementById('panelProducto').classList.remove('hidden');
        }

        function actualizarPreciosEnPantalla() {
            if (!productoSeleccionado) return;
            const cot = parseFloat(document.getElementById('cotizacionDolar').value) || 1;
            let finalArs = productoSeleccionado['Moneda (ARS/USD)'] === 'USD' ? (productoSeleccionado.Precio || 0) * cot : (productoSeleccionado.Precio || 0);
            document.getElementById('cardPrecioOriginal').innerText = productoSeleccionado['Moneda (ARS/USD)'] === 'USD' ? `Base: USD $${(productoSeleccionado.Precio || 0).toFixed(2)}` : `Base: ARS`;
            document.getElementById('cardPrecioPesos').innerText = `$ ${finalArs.toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
        }

        function descargarPDFDirecto(tipo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
            
            const rubroFiltro = document.getElementById('repRubro').value;
            const cot = parseFloat(document.getElementById('cotizacionDolar').value) || 1;
            const fecha = new Date().toLocaleDateString('es-AR');
            
            let filtrados = bd_productos.filter(p => p.ID);
            if (rubroFiltro !== 'TODOS') {
                filtrados = filtrados.filter(p => p.Rubro === rubroFiltro);
            }
            
            if (filtrados.length === 0) {
                alert("No hay artículos cargados para este rubro.");
                return;
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.setTextColor(30, 58, 138); 
            doc.text("PROYECTO AGUA", 14, 18);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139); 
            doc.setFont("helvetica", "normal");
            
            let tituloDocumento = "";
            let columnas = [];
            let filas = [];

            if (tipo === 'precios') {
                tituloDocumento = `Lista de Precios Oficial - Rubro: ${rubroFiltro}`;
                doc.text(tituloDocumento, 14, 24);
                doc.text(`Fecha: ${fecha} | Referencia Dólar: $${cot}`, 14, 29);
                
                columnas = ["Código", "Descripción / Artículo", "Rubro", "Precio Final"];
                filas = filtrados.map(p => {
                    let pFinal = p['Moneda (ARS/USD)'] === 'USD' ? (p.Precio || 0) * cot : (p.Precio || 0);
                    return [
                        p.ID,
                        p.Descripción || '(Sin descripción)',
                        p.Rubro || 'Gral',
                        `$ ${pFinal.toLocaleString('es-AR', {minimumFractionDigits: 2})}`
                    ];
                });
            } else {
                tituloDocumento = `Reporte de Stock de Inventario - Rubro: ${rubroFiltro}`;
                doc.text(tituloDocumento, 14, 24);
                doc.text(`Fecha de emisión: ${fecha}`, 14, 29);
                
                columnas = ["Código", "Descripción / Artículo", "Stock Lemos", "Stock Ozamis"];
                filas = filtrados.map(p => [
                    p.ID,
                    p.Descripción || '(Sin descripción)',
                    `${p['Stock Lemos'] || 0} u.`,
                    `${p['Stock Ozamis'] || 0} u.`
                ]);
            }

            doc.autoTable({
                startY: 34,
                head: [columnas],
                body: filas,
                theme: 'striped',
                headStyles: { fillColor: [37, 99, 235], textColor: [255, 255, 255], fontStyle: 'bold' },
                styles: { fontSize: 9, cellPadding: 2.5 },
                columnStyles: {
                    0: { fontStyle: 'bold', cellWidth: 25 },
                    1: { cellWidth: 'auto' },
                    2: { halign: tipo === 'precios' ? 'left' : 'center' },
                    3: { halign: tipo === 'precios' ? 'right' : 'center', fontStyle: 'bold' }
                }
            });

            const nombreArchivo = `${tipo}_proyecto_agua_${fecha.replace(/\//g, '-')}.pdf`;
            doc.save(nombreArchivo);
        }

        async function registrarProductoNuevo() {
            const id = document.getElementById('nuevoID').value.trim();
            const desc = document.getElementById('nuevoDesc').value.trim();
            if(!id || !desc) { alert("Completá Código y Descripción."); return; }
            const prod = {
                ID: id, Descripción: desc, Rubro: document.getElementById('nuevoRubro').value,
                Proveedor: document.getElementById('nuevoProv').value, "Moneda (ARS/USD)": document.getElementById('nuevoMoneda').value,
                Precio: parseFloat(document.getElementById('nuevoPrecio').value) || 0, Costo: parseFloat(document.getElementById('nuevoCosto').value) || 0,
                "Stock Lemos": parseInt(document.getElementById('nuevoStockLemos').value) || 0, "Stock Ozamis": parseInt(document.getElementById('nuevoStockOzamis').value) || 0
            };
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'guardarProducto', data: prod }) });
                const rta = await res.json();
                if (rta.success) {
                    alert("Alta exitosa."); bd_productos.push(prod); cambiarModo('buscar');
                }
            } catch(e) { alert("Error."); }
        }

        async function ejecutarMovimiento(tipo) {
            if (!productoSeleccionado) return;
            const suc = document.getElementById('movSucursal').value;
            const cant = parseInt(document.getElementById('movCantidad').value) || 0;
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'moverStock', data: { ID: productoSeleccionado.ID, sucursal: suc, tipo: tipo, cantidad: cant } }) });
                const rta = await res.json();
                if (rta.success) { productoSeleccionado[suc] = rta.nuevoStock; seleccionarProducto(productoSeleccionado.ID); }
            } catch (e) { alert("Error."); }
        }

        async function guardarFichaProducto() {
            if (!productoSeleccionado) return;
            const prodModificado = {
                ID: productoSeleccionado.ID, Descripción: document.getElementById('editDesc').value,
                Rubro: document.getElementById('editRubro').value, Proveedor: document.getElementById('editProv').value,
                "Moneda (ARS/USD)": document.getElementById('editMoneda').value, Precio: parseFloat(document.getElementById('editPrecio').value) || 0,
                Costo: parseFloat(document.getElementById('editCosto').value) || 0, "Stock Lemos": productoSeleccionado["Stock Lemos"], "Stock Ozamis": productoSeleccionado["Stock Ozamis"]
            };
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'guardarProducto', data: prodModificado }) });
                const rta = await res.json();
                if (rta.success) { Object.assign(productoSeleccionado, prodModificado); seleccionarProducto(productoSeleccionado.ID); alert("Guardado."); }
            } catch (e) { alert("Error."); }
        }

        async function crearAuxiliar(tablaDestino) {
            const nombre = prompt(`Nombre para ${tablaDestino}:`); if (!nombre) return;
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'agregarAuxiliar', tabla: tablaDestino, nombre: nombre }) });
                const rta = await res.json();
                if (rta.success) {
                    if (tablaDestino === 'Rubros') bd_rubros.push({ Nombre: nombre });
                    if (tablaDestino === 'Proveedores') bd_proveedores.push({ Nombre: nombre });
                    actualizarMenusDesplegables();
                }
            } catch (e) { alert("Error."); }
        }
    </script>
